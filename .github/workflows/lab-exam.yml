name: lab4-ci-cd

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training
        run: python scripts/train.py

      - name: Show metrics
        run: cat metrics.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            model.pkl
            metrics.json
            sample_input.json

  deploy:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download trained artifacts
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: artifacts

      - name: Read new MSE
        id: read_mse
        run: |
          NEW_MSE=$(python -c "import json; print(json.load(open('artifacts/metrics.json'))['mse'])")
          echo "new_mse=$NEW_MSE" >> "$GITHUB_OUTPUT"
          echo "New MSE = $NEW_MSE"

      - name: Compare with BEST_MSE
        id: compare
        env:
          BEST_MSE: ${{ vars.BEST_MSE }}
        run: |
          NEW_MSE="${{ steps.read_mse.outputs.new_mse }}"
          IMPROVED=$(python -c "print('true' if float('$NEW_MSE') < float('$BEST_MSE') else 'false')")
          echo "improved=$IMPROVED" >> "$GITHUB_OUTPUT"

          echo "Current BEST_MSE = $BEST_MSE"
          echo "New MSE = $NEW_MSE"

          if [ "$IMPROVED" = "true" ]; then
            echo "2022BCS0056 ---- Model improved. Proceeding to deployment."
          else
            echo "Model did not improve skipping deployment. Evaluated by: Sree Vardhan Reddy - 2022BCS0056"
          fi

      - name: Copy model for Docker build
        if: steps.compare.outputs.improved == 'true'
        run: cp artifacts/model.pkl ./model.pkl

      - name: Login to Docker Hub
        if: steps.compare.outputs.improved == 'true'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        if: steps.compare.outputs.improved == 'true'
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sree_vardhan_reddy_2022bcs0056:latest .

      - name: Push Docker image
        if: steps.compare.outputs.improved == 'true'
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/sree_vardhan_reddy_2022bcs0056:latest

      - name: Update BEST_MSE in GitHub repository variable
        if: steps.compare.outputs.improved == 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          NEW_MSE: ${{ steps.read_mse.outputs.new_mse }}
        run: |
          curl -f -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_PAT" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/$REPO/actions/variables/BEST_MSE \
            -d "{\"name\":\"BEST_MSE\",\"value\":\"$NEW_MSE\"}"

      - name: Finish
        run: echo "Workflow finished for Sree Vardhan Reddy - 2022BCS0056"